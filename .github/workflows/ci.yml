name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'CHANGELOG.md'
      - 'LICENSE'
      - 'docbook/**'
      - '**/*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'CHANGELOG.md'
      - 'LICENSE'
      - 'docbook/**'
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qemu-private-tests:
    name: QEMU Private Tests (macOS, armv7m -> armv6m)
    runs-on: [self-hosted, macOS, qemu]
    timeout-minutes: 80
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate runner toolchain
        run: |
          set -euo pipefail
          command -v qemu-system-arm
          command -v arm-none-eabi-gcc

      - name: Link private tests/qemu into workspace
        env:
          PRIVATE_QEMU_HARNESS_DIR: ${{ vars.PRIVATE_QEMU_HARNESS_DIR }}
          PRIVATE_QEMU_TESTS_DIR: ${{ vars.PRIVATE_QEMU_TESTS_DIR }}
        run: |
          set -euo pipefail
          HARNESS_SRC_RAW="${PRIVATE_QEMU_HARNESS_DIR:-${PRIVATE_QEMU_TESTS_DIR:-/Users/antonio/private-rk0-harness/qemu}}"
          HARNESS_SRC="${HARNESS_SRC_RAW#PRIVATE_QEMU_HARNESS_DIR=}"
          HARNESS_SRC="${HARNESS_SRC#PRIVATE_QEMU_TESTS_DIR=}"
          HARNESS_SRC="$(printf '%s' "${HARNESS_SRC}" | tr -d '\r\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"

          if [[ ! -d "${HARNESS_SRC}" ]]; then
            echo "::error::Private harness path not found: ${HARNESS_SRC}"
            echo "Set repo variable PRIVATE_QEMU_HARNESS_DIR (or PRIVATE_QEMU_TESTS_DIR) to your local private qemu directory on the runner host."
            exit 1
          fi

          if [[ ! -x "${HARNESS_SRC}/scripts/qemu/run_unit_tests.sh" ]]; then
            echo "::error::Missing executable script: ${HARNESS_SRC}/scripts/qemu/run_unit_tests.sh"
            exit 1
          fi

          if [[ ! -x "${HARNESS_SRC}/scripts/qemu/run_scheduler_tests.sh" ]]; then
            echo "::error::Missing executable script: ${HARNESS_SRC}/scripts/qemu/run_scheduler_tests.sh"
            exit 1
          fi

          mkdir -p tests scripts
          rm -rf tests/qemu
          rm -rf scripts/qemu
          ln -s "${HARNESS_SRC}" tests/qemu
          ln -s "${HARNESS_SRC}/scripts/qemu" scripts/qemu
          ls -la tests
          ls -la scripts

      - name: Run QEMU unit tests
        env:
          ARCH: armv7m
          BUILD: DEBUG
          QEMU_TEST_TIMEOUT: 12
        run: |
          set -euo pipefail
          ./scripts/qemu/run_unit_tests.sh --all

      - name: Run scheduler conformance test
        env:
          ARCH: armv7m
          BUILD: DEBUG
          QEMU_TEST_TIMEOUT: 12
        run: |
          set -euo pipefail
          ./scripts/qemu/run_scheduler_tests.sh

      - name: Run ASR queue+siginfo tests (armv7m)
        env:
          ARCH: armv7m
          BUILD: DEBUG
          QEMU_TEST_TIMEOUT: 12
          EXTRA_DEFS: >-
            -URK_CONF_ASR -DRK_CONF_ASR=ON
            -URK_CONF_ASR_SIGINFO -DRK_CONF_ASR_SIGINFO=ON
            -URK_CONF_ASR_QUEUE_SAME_SIGNAL -DRK_CONF_ASR_QUEUE_SAME_SIGNAL=ON
            -URK_CONF_ASR_QUEUE_MAX_PER_SIGNAL -DRK_CONF_ASR_QUEUE_MAX_PER_SIGNAL=4UL
            -URK_CONF_ASR_WARN_UNHANDLED_SEND -DRK_CONF_ASR_WARN_UNHANDLED_SEND=OFF
        run: |
          set -euo pipefail
          ./scripts/qemu/run_unit_tests.sh kasr

      - name: Run QEMU unit tests (armv6m)
        env:
          ARCH: armv6m
          BUILD: DEBUG
          QEMU_TEST_TIMEOUT: 12
        run: |
          set -euo pipefail
          ./scripts/qemu/run_unit_tests.sh --all

      - name: Run scheduler conformance test (armv6m)
        env:
          ARCH: armv6m
          BUILD: DEBUG
          QEMU_TEST_TIMEOUT: 12
        run: |
          set -euo pipefail
          ./scripts/qemu/run_scheduler_tests.sh

      - name: Run ASR queue+siginfo tests (armv6m)
        env:
          ARCH: armv6m
          BUILD: DEBUG
          QEMU_TEST_TIMEOUT: 12
          EXTRA_DEFS: >-
            -URK_CONF_ASR -DRK_CONF_ASR=ON
            -URK_CONF_ASR_SIGINFO -DRK_CONF_ASR_SIGINFO=ON
            -URK_CONF_ASR_QUEUE_SAME_SIGNAL -DRK_CONF_ASR_QUEUE_SAME_SIGNAL=ON
            -URK_CONF_ASR_QUEUE_MAX_PER_SIGNAL -DRK_CONF_ASR_QUEUE_MAX_PER_SIGNAL=4UL
            -URK_CONF_ASR_WARN_UNHANDLED_SEND -DRK_CONF_ASR_WARN_UNHANDLED_SEND=OFF
        run: |
          set -euo pipefail
          ./scripts/qemu/run_unit_tests.sh kasr

      - name: Upload QEMU logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-logs-armv7m-armv6m-${{ github.run_number }}
          if-no-files-found: warn
          path: |
            build/**/qemu-tests/*.log
            test.log
            unitests.log
